<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesión Colaborativa</title>
    <style>
        /* --- ESTILOS (Mismos de la versión anterior gama ROJA) --- */
        body { font-family: "Segoe UI", sans-serif; background-color: #f3f2f1; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
       /* HEADER MEJORADO */
        header { background-color: #b30000; color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header-left { display: flex; align-items: center; }
        header img { height: 35px; margin-right: 15px; background: white; padding: 5px; border-radius: 4px; }
        header h1 { font-size: 1.2rem; margin: 0; font-weight: 600; }
        /* Usuario Badge */
        .user-badge { background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 15px; font-size: 0.9rem; cursor: pointer; }
        .user-badge:hover { background: rgba(255,255,255,0.3); }

        main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
        .card { background: white; width: 100%; max-width: 600px; border-radius: 4px; box-shadow: 0 1.6px 3.6px 0 rgba(0,0,0,0.132); padding: 30px; text-align: center; }
        
        textarea { width: 100%; border: 1px solid #8a8886; padding: 10px; margin-top: 15px; min-height: 120px; font-family: inherit; }
        .btn-primary { background-color: #d13438; color: white; border: none; padding: 10px 24px; font-size: 1rem; border-radius: 2px; cursor: pointer; margin-top: 20px; width: 100%; }
        .btn-primary:hover { background-color: #a4262c; }
        .vote-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #fff; border: 1px solid #d1d1d1; border-left: 5px solid #d13438; text-align: left; cursor: pointer; }
        .vote-btn:hover { background-color: #fdf3f4; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #b30000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    /* --- LOGIN OVERLAY (PANTALLA DE NOMBRE) --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            display: flex; /* Flex para centrar */
            justify-content: center;
            align-items: center;
        }
        .hidden { display: none !important; }
        .login-box { text-align: center; width: 90%; max-width: 400px; }
        .login-box input { width: 100%; padding: 15px; font-size: 1.2rem; margin: 20px 0; border: 2px solid #b30000; border-radius: 4px; text-align: center; }
        /* --- ESTILOS PARA CHECKBOXES --- */
        .checkbox-item {
            display: flex;
            align-items: center;
            background: white;
            border: 1px solid #d1d1d1;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .checkbox-item:hover { background-color: #fdf3f4; }

/* Ocultamos el checkbox feo nativo y usamos uno custom si quieres, 
   o simplemente lo dejamos grande */
        .checkbox-item input[type="checkbox"] {
            transform: scale(1.5); /* Hace el cuadradito más grande */
            margin-right: 15px;
            cursor: pointer;
        }

        .checkbox-item label {
            cursor: pointer;
            flex: 1; /* Ocupa todo el espacio */
            font-size: 1rem;
        }
    </style>
</head>
<body>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#b30000">¡Bienvenido!</h2>
            <p>Para participar, dinos cómo quieres llamarte:</p>
            <input type="text" id="txtNombreUsuario" placeholder="Tu Nombre o Apodo">
            <button class="btn-primary" onclick="guardarNombre()">Entrar a la Sesión</button>
        </div>
    </div>
    <header>
        <img src="https://argentina.practia.global/wp-content/uploads/2024/01/logo-practia-psapient.png" alt="Logo">
        <h1>Workshop Facilitador</h1>
        <div id="user-display" class="user-badge" onclick="cambiarUsuario()">👤</div>
    </header>

    <main>
        <div id="card-content" class="card">
            <h2>Cargando...</h2>
            <div class="spinner"></div>
            <p>Buscando sesión activa...</p>
        </div>
    </main>

    <script>
        // ==========================================
        // CONFIGURACIÓN (SOLO URLs)
        // ==========================================
        const URL_FLUJO_LECTURA = "https://defaultd52c9ea17c2147b182a333a74b1f74.b8.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/61c7905cbe12441e8551822bacf79d6e/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=kgqQhdfZ6NmdjNH1lOxs2ti83K3iD15bSHBFdbkkRk8";
        const URL_FLUJO_ESCRITURA = "https://defaultd52c9ea17c2147b182a333a74b1f74.b8.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/60c549ca3b5040fdb5e44614547d8229/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=xyDvEjCgUCZr7UAAp7H-UAMqQLhfFvFPCFYk_SKmNzg";
        // ==========================================

        // VARIABLES DINÁMICAS (Se llenan solas)
       // VARIABLES DINÁMICAS (Se llenan solas)
        let sesionActivaID = null; 
        let actividadID = null;
        let estadoUltimo = "";
        let miNombre = ""; 
        let globalConfig = null; // <--- NUEVA: Para guardar la config y leer el título después
        
        window.onload = function() {
            // 1. Verificamos identidad
            verificarLogin();

            if (URL_FLUJO_LECTURA.includes("PEGA_AQUI")) {
                alert("⚠️ Error: Configura las URLs en el archivo HTML.");
                return;
            }
            // Arrancamos el polling
            consultarEstado();
            setInterval(consultarEstado, 3000);
        };

        // --- GESTIÓN DE USUARIO (Local Storage) ---
        function verificarLogin() {
            const guardado = localStorage.getItem('Taller_UsuarioNombre');
            if (guardado) {
                miNombre = guardado;
                document.getElementById('login-overlay').classList.add('hidden');
                const display = document.getElementById('user-display');
                if(display) display.innerText = "👤 " + miNombre;
            } else {
                document.getElementById('login-overlay').classList.remove('hidden');
            }
        }

        function guardarNombre() {
            const input = document.getElementById('txtNombreUsuario');
            const nombre = input.value.trim();
            if (nombre.length < 2) return alert("Por favor escribe un nombre válido.");
            
            localStorage.setItem('Taller_UsuarioNombre', nombre);
            verificarLogin(); 
        }

        function cambiarUsuario() {
            if(confirm("¿Quieres cambiar tu nombre de usuario?")) {
                localStorage.removeItem('Taller_UsuarioNombre');
                location.reload();
            }
        }

        // 1. CONSULTAR ESTADO
        async function consultarEstado() {
            try {
                const response = await fetch(URL_FLUJO_LECTURA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({}) 
                });

                if (!response.ok) throw new Error("Error de red");
                
                const data = await response.json(); 

                // Comparamos ANTES de actualizar las variables globales
                if (data.estado !== estadoUltimo || data.actividad !== actividadID) {
                    
                    // Actualizamos las variables globales
                    sesionActivaID = data.id;
                    actividadID = data.actividad;
                    estadoUltimo = data.estado;

                    // --- GUARDAMOS LA CONFIG GLOBALMENTE ---
                    try {
                        globalConfig = (typeof data.config === 'string') ? JSON.parse(data.config) : data.config;
                    } catch(e) { globalConfig = {}; }

                    console.log("Detectado cambio de fase. Renderizando...");
                    renderizarPantalla(data.estado, globalConfig);
                } else {
                    if(data.id) sesionActivaID = data.id;
                    // Aseguramos que globalConfig tenga datos aunque no cambie el estado
                    if(!globalConfig && data.config) {
                         try {
                            globalConfig = (typeof data.config === 'string') ? JSON.parse(data.config) : data.config;
                        } catch(e) {}
                    }
                }

            } catch (error) {
                console.error("Buscando sesión...", error);
            }
        }

        // 2. PINTAR PANTALLA
        function renderizarPantalla(estado, config) {
            const container = document.getElementById("card-content");
            // Nota: 'config' ya viene parseado desde consultarEstado
            
            container.innerHTML = "";

            if (estado === "ESPERA" || estado === "PROCESANDO") {
                container.innerHTML = `
                    <h2>✋ Atención al frente</h2>
                    <div class="spinner"></div>
                    <p>La IA está procesando (Sesión: ${sesionActivaID || 'Cargando...'})</p>
                `;
            }
            else if (estado === "INPUT" || estado === "PREGUNTA_ABIERTA") {
                container.innerHTML = `
                    <h2>${config.contenido?.titulo || "Pregunta"}</h2>
                    <p>${config.contenido?.subtitulo || ""}</p>
                    <textarea id="inputRespuesta" placeholder="${config.contenido?.placeholder || 'Escribe aquí...'}"></textarea>
                    <button class="btn-primary" onclick="enviarDatos('TEXTO')">
                        ${config.contenido?.boton_texto || "Enviar"}
                    </button>
                `;
            }
            else if (estado === "VOTACION") {
                let html = `<h2>${config.contenido?.titulo || "Votación Múltiple"}</h2>`;
                html += `<p style="margin-bottom:20px; color:#666">${config.contenido?.instruccion || "Selecciona una o más opciones:"}</p>`;
                
                html += `<div id="lista-opciones" style="text-align:left">`; 

                if (config.contenido?.opciones) {
                    config.contenido.opciones.forEach(op => {
                        html += `
                            <div class="checkbox-item" onclick="toggleCheckbox('chk_${op.id}')">
                                <input type="checkbox" 
                                id="chk_${op.id}" 
                                name="voto" 
                                value="${op.id}" 
                                data-texto="${op.texto}" 
                                onclick="event.stopPropagation()">
                                <label for="chk_${op.id}">${op.texto}</label>
                            </div>`;
                    });
                }
                html += `</div>`;
                
                html += `
                <button class="btn-primary" style="margin-top:20px" onclick="enviarSeleccion()">
                    Enviar Votos Seleccionados
                </button>`;

                container.innerHTML = html;
            }
        }

        function toggleCheckbox(id) {
            const el = document.getElementById(id);
            if(el) el.checked = !el.checked;
        }

        // 3. ENVIAR DATOS (TEXTO)
        async function enviarDatos(tipo) {
            if (!sesionActivaID) return alert("Error: No se ha detectado una sesión activa.");

            const container = document.getElementById("card-content");
            let payload = {
                sesion: sesionActivaID,
                actividad: actividadID,
                usuario: miNombre, 
                tipo: tipo 
            };

            if (tipo === 'TEXTO') {
                const txt = document.getElementById("inputRespuesta").value;
                if (!txt) return alert("Escribe algo.");
                payload.respuesta = txt;
                // USAMOS globalConfig EN LUGAR DE data
                payload.txtPregunta = globalConfig?.contenido?.titulo || "Pregunta Abierta";
            } 

            container.innerHTML = `<h2>Enviando...</h2><div class="spinner"></div>`;

            try {
                await fetch(URL_FLUJO_ESCRITURA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                container.innerHTML = `<h2 style="color:#107C10">¡Recibido! ✅</h2><p>Esperando...</p>`;
            } catch (error) {
                alert("Error enviando respuesta.");
                consultarEstado(); 
            }
        }

        // 4. ENVIAR SELECCION (VOTOS)
        async function enviarSeleccion() {
            const marcados = document.querySelectorAll('input[name="voto"]:checked');
            
            if (marcados.length === 0) {
                alert("Por favor selecciona al menos una opción.");
                return;
            }

            const container = document.getElementById("card-content");
            container.innerHTML = `
                <h2>Enviando ${marcados.length} votos...</h2>
                <div class="spinner"></div>
                <p>Por favor espera.</p>
            `;

            // --- CORRECCIÓN CLAVE AQUÍ ---
            const envios = Array.from(marcados).map(checkbox => { // 'checkbox' es el argumento
                const idOpcion = parseInt(checkbox.value);
                // Usamos 'checkbox' aquí, NO 'chk'
                const textoOpcion = checkbox.getAttribute('data-texto'); 
                
                const payload = {
                    sesion: sesionActivaID,
                    actividad: actividadID,
                    usuario: miNombre,
                    tipo: 'VOTO',
                    opcion_id: idOpcion,
                    opcion_texto: textoOpcion,
                    // USAMOS globalConfig EN LUGAR DE data
                    txtPregunta: globalConfig?.contenido?.titulo || "Votación"
                };

                return fetch(URL_FLUJO_ESCRITURA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            });

            try {
                await Promise.all(envios);
                container.innerHTML = `
                    <h2 style="color:#107C10">¡Votos Registrados! ✅</h2>
                    <p>Has enviado ${marcados.length} selecciones.</p>
                    <p style="font-size:0.9rem; color:#888">Esperando siguiente actividad...</p>
                `;
            } catch (error) {
                console.error(error);
                container.innerHTML = `
                    <h3 style="color:#a4262c">Hubo un error</h3>
                    <p>Algunos votos pueden no haberse guardado.</p>
                    <button class="btn-primary" onclick="consultarEstado()">Intentar de nuevo</button>
                `;
            }
        }
    </script>
</body>
</html>
